<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Kiss Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff5f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; user-select: none; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, #ffd6e7 1px, transparent 1px); background-size: 32px 32px; opacity: 0.4; pointer-events: none; }
  .screen { display: none; flex-direction: column; align-items: center; gap: 24px; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* SELECT */
  .select-title { font-size: 11px; color: #d4709a; letter-spacing: 2px; line-height: 2; text-align: center; }
  .gif-row { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .gif-card { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }
  .gif-card img { width: 220px; height: 220px; object-fit: contain; image-rendering: pixelated; border: 4px solid #e8a0bf; border-radius: 16px; background: #fff8fb; transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s; }
  .gif-card:hover img { transform: scale(1.05); border-color: #ff6eb4; box-shadow: 0 0 18px #ffb7d5; }
  .gif-label { font-size: 7px; color: #c07090; letter-spacing: 1px; }
  .choose-btn { background: #ffb7d5; border: 3px solid #e07aa0; border-bottom: 5px solid #b05070; border-radius: 10px; padding: 8px 16px; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #7a1040; cursor: pointer; letter-spacing: 1px; }
  .mode-row { display: flex; gap: 14px; }
  .mode-btn { background: #fff0f6; border: 3px solid #e8a0bf; border-bottom: 5px solid #c07090; border-radius: 10px; padding: 10px 18px; font-family: 'Press Start 2P', monospace; font-size: 8px; color: #c07090; cursor: pointer; letter-spacing: 1px; }
  .mode-btn.on { background: #ffb7d5; border-color: #e07aa0; border-bottom-color: #b05070; color: #7a1040; }

  /* GAME */
  .game-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .game-title { font-size: 9px; color: #d4709a; letter-spacing: 2px; line-height: 1.8; }

  /* BATTERY */
  .battery-wrap { display: flex; align-items: center; gap: 10px; }
  .battery-shell {
    position: relative; width: 220px; height: 28px;
    border: 3px solid #333; border-radius: 6px;
    background: #e8f8e8; overflow: hidden;
  }
  .battery-shell::after {
    content: ''; position: absolute; right: -10px; top: 50%;
    transform: translateY(-50%);
    width: 7px; height: 14px; background: #333; border-radius: 0 3px 3px 0;
  }
  .battery-fill {
    height: 100%; width: 0%;
    background: linear-gradient(to right, #44dd44, #22bb22);
    border-radius: 3px; transition: none;
  }
  .battery-fill.low  { background: linear-gradient(to right, #ff4444, #cc2222); }
  .battery-fill.mid  { background: linear-gradient(to right, #ffbb00, #dd8800); }
  .battery-fill.full-anim { animation: battglow 0.5s ease-in-out infinite alternate; }
  @keyframes battglow { from { filter: brightness(1); } to { filter: brightness(1.25); } }
  .battery-pct { font-size: 9px; color: #228822; letter-spacing: 1px; min-width: 44px; }
  .battery-pct.low { color: #cc2222; }
  .battery-pct.mid { color: #dd8800; }

  .frame-wrap { position: relative; width: 440px; height: 440px; }
  .frame { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; border-radius: 16px; opacity: 0; }
  .frame.on { opacity: 1; }
  .hearts { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
  @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.5); } }

  /* HAIR PICKER */
  .hair-picker { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .hair-lbl { font-size: 7px; color: #c07090; letter-spacing: 1px; }
  .hair-row { display: flex; align-items: center; gap: 10px; }
  .hair-btns { display: flex; gap: 8px; }
  .hair-btn { width: 26px; height: 26px; border-radius: 50%; border: 3px solid rgba(0,0,0,0.15); cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
  .hair-btn:hover { transform: scale(1.2); }
  .hair-btn.on { border: 3px solid #fff; box-shadow: 0 0 0 3px #e07aa0; transform: scale(1.15); }
  .z-btn { background: #fff0f6; border: 3px solid #e8a0bf; border-bottom: 4px solid #c07090; border-radius: 8px; padding: 6px 10px; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #c07090; cursor: pointer; letter-spacing: 1px; white-space: nowrap; }
  .rainbow-btn { background: linear-gradient(90deg,#ff6eb4,#ffb700,#44cc44,#4db8ff,#c07090); color: #fff; border-color: #888; border-bottom-color: #555; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .z-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

  .timer-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .timer-lbl { font-size: 7px; color: #c07090; letter-spacing: 1px; }
  .timer-val { font-size: 13px; color: #e0507a; letter-spacing: 2px; min-width: 90px; text-align: center; }

  .hint { display: flex; align-items: center; gap: 8px; color: #b06080; font-size: 7px; letter-spacing: 1px; flex-wrap: wrap; justify-content: center; }
  .key { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: #fff; border: 3px solid #e8a0bf; border-bottom: 5px solid #c07090; border-radius: 8px; font-size: 11px; font-weight: bold; color: #c07090; font-family: 'Press Start 2P', monospace; transition: transform 0.05s, border-bottom-width 0.05s; }
  .key.pressed { transform: translateY(2px); border-bottom-width: 3px; }

  .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .tap-btn { background: #ffb7d5; border: 4px solid #e07aa0; border-bottom: 6px solid #b05070; border-radius: 12px; padding: 12px 22px; font-family: 'Press Start 2P', monospace; font-size: 9px; color: #7a1040; cursor: pointer; letter-spacing: 1px; }
  .tap-btn:active { transform: translateY(2px); border-bottom-width: 4px; }
  .exit-btn { background: #ffe0ee; border: 3px solid #e8a0bf; border-bottom: 5px solid #c07090; border-radius: 10px; padding: 8px 14px; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #c07090; cursor: pointer; letter-spacing: 1px; }
  .exit-btn:active { transform: translateY(2px); border-bottom-width: 3px; }

  /* WIN */
  .win-overlay { display: none; position: fixed; inset: 0; background: rgba(255,230,240,0.93); flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
  .win-overlay.active { display: flex; }
  .win-title { font-size: 16px; color: #c0006a; text-align: center; line-height: 2; animation: pop 0.4s cubic-bezier(.22,1.5,.36,1); }
  .win-stat { font-size: 11px; color: #e0507a; letter-spacing: 2px; }
  .win-stat2 { font-size: 9px; color: #c07090; letter-spacing: 1px; }
  .win-btns { display: flex; gap: 14px; margin-top: 8px; }
  .win-btn { background: #ff85b3; border: 3px solid #c0006a; border-bottom: 5px solid #800040; border-radius: 10px; padding: 12px 20px; font-family: 'Press Start 2P', monospace; font-size: 8px; color: #fff; cursor: pointer; letter-spacing: 1px; }
  @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div id="selectScreen" class="screen active">
  <div class="select-title">&#9829; choose your gif &#9829;</div>
  <div class="gif-row">
    <div class="gif-card" onclick="startGame('bears')">
      <img id="prevBears" alt="bears">
      <div class="gif-label">pixel bears</div>
      <button class="choose-btn">&#9654; CHOOSE</button>
    </div>
    <div class="gif-card" onclick="startGame('cats')">
      <img id="prevCats" alt="cats">
      <div class="gif-label">pixel cats</div>
      <button class="choose-btn">&#9654; CHOOSE</button>
    </div>
    <div class="gif-card" onclick="startGame('anime')">
      <img id="prevAnime" alt="anime">
      <div class="gif-label">pixel anime</div>
      <button class="choose-btn">&#9654; CHOOSE</button>
    </div>
  </div>
  <div class="mode-row">
    <button class="mode-btn on" id="btnChallenge" onclick="setMode('challenge')">&#9654; CHALLENGE</button>
    <button class="mode-btn"   id="btnEndless"   onclick="setMode('endless')">&#8734; ENDLESS</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-col">
    <div class="game-title" id="gameTitle"></div>

    <!-- Battery bar (challenge only) -->
    <div class="battery-wrap" id="batteryWrap">
      <div class="battery-shell">
        <div class="battery-fill" id="battFill"></div>
      </div>
      <div class="battery-pct" id="battPct">0%</div>
    </div>

    <div class="frame-wrap" id="frameWrap">
      <div class="hearts" id="heartsEl"></div>
    </div>

    <!-- Hair picker (anime only) -->
    <div class="hair-picker" id="hairPicker" style="display:none">
      <div class="hair-lbl">HAIR COLOR</div>
      <div class="hair-row">
        <div class="hair-btns" id="hairBtns"></div>
        <button class="z-btn" onclick="cycleHair()">Z change hair</button>
        <button class="z-btn rainbow-btn" onclick="rainbowStart()">C rainbow</button>
      </div>
    </div>

    <div class="timer-box">
      <div class="timer-lbl">TIME</div>
      <div class="timer-val" id="timerVal">00.00</div>
    </div>

    <div class="hint">
      <span id="hintText">spam</span> <div class="key" id="keyEl">X</div> to go!
      &nbsp;&nbsp;<span id="hairHint" style="display:none">| <div class="key">Z</div> hair</span>
    </div>

    <div class="btn-row">
      <button class="tap-btn" id="tapBtn" onpointerdown="startPress()" onpointerup="stopPress()" onpointerleave="stopPress()">&#9829; TAP &#9829;</button>
      <button class="exit-btn" onclick="goBack()">&#8656; EXIT</button>
    </div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-title" id="winTitle">&#9829; FULL LOVE &#9829;</div>
  <div class="win-stat"  id="winStat"></div>
  <div class="win-stat2" id="winStat2"></div>
  <div class="win-btns">
    <button class="win-btn" onclick="again()">&#9654; PLAY AGAIN</button>
    <button class="win-btn" onclick="goBack()">&#8656; CHANGE GIF</button>
  </div>
</div>

document.getElementById('prevBears').src = GIFS.bears.frames[0];
document.getElementById('prevCats').src  = GIFS.cats.frames[0];
document.getElementById('prevAnime').src = HAIR_COLORS[Math.floor(Math.random()*HAIR_COLORS.length)].f1;

const TOTAL=20;
const emojis=['\u{1F497}','\u{1F495}','\u{1F496}','\u{1F493}','\u{1F49D}'];
let mode='challenge', gif, frameEls=[], fi=0;
let clicks=0, done=false, tStart=null, tInterval=null, elapsed=0, eIdx=0, endlessEp=0, rainbowInterval=null;
let selectedHair=0, holdInterval=null;

function setMode(m){
  mode=m;
  document.getElementById('btnChallenge').classList.toggle('on',m==='challenge');
  document.getElementById('btnEndless').classList.toggle('on',m==='endless');
}

function buildHairButtons(){
  const c=document.getElementById('hairBtns'); c.innerHTML='';
  HAIR_COLORS.forEach((h,i)=>{
    const b=document.createElement('button');
    b.className='hair-btn'+(i===selectedHair?' on':'');
    b.style.background=h.color; b.title=h.name;
    b.onclick=()=>selectHair(i, true);
    c.appendChild(b);
  });
}

function selectHair(idx, manual){
  if(manual) rainbowStop();
  selectedHair=idx;
  document.querySelectorAll('.hair-btn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  const hc=HAIR_COLORS[idx];
  const wrap=document.getElementById('frameWrap');
  const hearts=document.getElementById('heartsEl');
  const curFi=fi;
  frameEls.forEach(el=>el.remove()); frameEls=[];
  [hc.f1,hc.f2].forEach((src,i)=>{
    const img=document.createElement('img');
    img.src=src; img.className='frame'+(i===curFi?' on':'');
    wrap.insertBefore(img,hearts); frameEls.push(img);
  });
}

function rainbowStart(){
  if(gif!=='anime') return;
  if(rainbowInterval) return; // already running
  rainbowInterval=setInterval(()=>{ selectHair((selectedHair+1)%HAIR_COLORS.length); },500);
}
function rainbowStop(){
  clearInterval(rainbowInterval); rainbowInterval=null;
}
function cycleHair(){
  selectHair((selectedHair+1)%HAIR_COLORS.length);
}

function updateBattery(pct, endless){
  const fill=document.getElementById('battFill');
  const label=document.getElementById('battPct');
  fill.style.width=pct+'%';
  fill.classList.remove('low','mid','full-anim');
  label.classList.remove('low','mid');
  if(pct>=100){
    fill.classList.add('full-anim');
    label.style.fontSize=endless?'40px':'9px';
    label.textContent=endless?'∞':'100%';
  } else if(!endless && pct<=20){
    fill.classList.add('low'); label.classList.add('low');
    label.style.fontSize='9px'; label.textContent=Math.round(pct)+'%';
  } else if(!endless && pct<=50){
    fill.classList.add('mid'); label.classList.add('mid');
    label.style.fontSize='9px'; label.textContent=Math.round(pct)+'%';
  } else {
    label.style.fontSize='9px'; label.textContent=Math.round(pct)+'%';
  }
}

function startGame(g){
  gif=g;
  show('gameScreen');
  document.getElementById('gameTitle').textContent=GIFS[g].title;
  const isAnime=GIFS[g].hasHair;
  const isEndless=mode==='endless';
  document.getElementById('hairPicker').style.display=isAnime?'flex':'none';
  document.getElementById('hairHint').style.display=isAnime?'inline':'none';
  document.getElementById('batteryWrap').style.display='flex';
  document.getElementById('hintText').textContent=isEndless?'hold':'spam';

  frameEls.forEach(el=>el.remove()); frameEls=[]; fi=0;
  const wrap=document.getElementById('frameWrap');
  const hearts=document.getElementById('heartsEl');
  if(isAnime){
    buildHairButtons();
    const hc=HAIR_COLORS[selectedHair];
    [hc.f1,hc.f2].forEach((src,i)=>{
      const img=document.createElement('img');
      img.src=src; img.className='frame'+(i===0?' on':'');
      wrap.insertBefore(img,hearts); frameEls.push(img);
    });
  } else {
    GIFS[g].frames.forEach((src,i)=>{
      const img=document.createElement('img');
      img.src=src; img.className='frame'+(i===0?' on':'');
      wrap.insertBefore(img,hearts); frameEls.push(img);
    });
  }
  reset();
}

let endlessFillInterval=null;
function reset(){
  clicks=0; done=false; tStart=null; elapsed=0; eIdx=0; endlessEp=0;
  clearInterval(tInterval); clearInterval(endlessFillInterval);
  document.getElementById('timerVal').textContent='00.00';
  updateBattery(0, mode==='endless');
  // endless fill starts on first press, not here
}

function onPress(){
  if(done) return;
  if(!tStart){
    tStart=performance.now();
    tInterval=setInterval(()=>{
      elapsed=(performance.now()-tStart)/1000;
      document.getElementById('timerVal').textContent=elapsed.toFixed(2);
    },50);

  }
  frameEls[fi].classList.remove('on');
  fi=(fi+1)%frameEls.length;
  frameEls[fi].classList.add('on');
  spawnHeart();
  const k=document.getElementById('keyEl');
  k.classList.add('pressed'); setTimeout(()=>k.classList.remove('pressed'),80);
  if(mode!=='endless'){
    clicks++;
    const pct=Math.min(clicks/TOTAL*100,100);
    updateBattery(pct, false);
    if(clicks>=TOTAL) triggerWin();
  }
}

function startPress(){
  if(mode==='endless'){
    onPress();
    holdInterval=setInterval(onPress,200);
    // start filling bar while held
    endlessFillInterval=setInterval(()=>{
      endlessEp+=100/60;
      if(endlessEp>=100){ endlessEp=100; clearInterval(endlessFillInterval); endlessFillInterval=null; }
      updateBattery(endlessEp, true);
    },100);
  } else { onPress(); }
}
function stopPress(){
  clearInterval(holdInterval); holdInterval=null;
  // pause fill when released
  clearInterval(endlessFillInterval); endlessFillInterval=null;
}

function spawnHeart(){
  const h=document.createElement('span');
  h.textContent=emojis[eIdx++%emojis.length];
  h.style.cssText='position:absolute;font-size:'+(16+Math.random()*12)+'px;bottom:10px;left:'+(10+Math.random()*78)+'%;opacity:1;animation:floatUp '+(0.7+Math.random()*0.4)+'s ease-out forwards;pointer-events:none;';
  document.getElementById('heartsEl').appendChild(h);
  h.addEventListener('animationend',()=>h.remove());
}

function triggerWin(){
  clearInterval(endlessFillInterval);
  done=true; clearInterval(tInterval);
  for(let i=0;i<10;i++) setTimeout(spawnHeart,i*70);
  const msgs=['Obichkam te Desence <3!','Battery Recharged!','Hope You Feeling better!','Have a nice day!'];
  setTimeout(()=>{
    document.getElementById('winTitle').textContent=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('winStat').textContent='\u23f1 '+elapsed.toFixed(2)+'s';
    document.getElementById('winStat2').textContent=clicks+' clicks';
    document.getElementById('winOverlay').classList.add('active');
  },600);
}

function again(){
  document.getElementById('winOverlay').classList.remove('active');
  frameEls[fi].classList.remove('on'); fi=0; frameEls[0].classList.add('on');
  reset();
}

function goBack(){
  document.getElementById('winOverlay').classList.remove('active');
  stopPress(); clearInterval(endlessFillInterval); rainbowStop();
  frameEls[fi].classList.remove('on'); fi=0;
  show('selectScreen');
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='selectScreen'){
    document.getElementById('prevAnime').src=HAIR_COLORS[Math.floor(Math.random()*HAIR_COLORS.length)].f1;
  }
}

document.addEventListener('keydown',e=>{
  if((e.key==='x'||e.key==='X')&&!e.repeat) startPress();
  if((e.key==='z'||e.key==='Z')&&!e.repeat && gif==='anime'){ rainbowStop(); cycleHair(); }
  if((e.key==='c'||e.key==='C')&&!e.repeat && gif==='anime') rainbowStart();
});
document.addEventListener('keyup',e=>{ if(e.key==='x'||e.key==='X') stopPress(); });
</script>
</body>
</html>
